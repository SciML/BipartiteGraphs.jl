name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - 'benchmark/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - 'benchmark/**'
jobs:
  test:
    strategy:
      matrix:
        julia-version: ['lts']
        group: ['InterfaceI']
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "${{ matrix.julia-version }}"
      group: "${{ matrix.group }}"
    secrets: "inherit"
